<title>Shot List — Costa Rica April 2026</title>
<style>
  :root {
    --teal: #1A7A6D;
    --teal-dark: #145F54;
    --teal-light: #D4ECE8;
    --gold: #C8962E;
    --gold-light: #FEF3CD;
    --white: #FFFFFF;
    --offwhite: #F8F9FA;
    --dark: #2D2D2D;
    --gray: #666666;
    --light-gray: #E9ECEF;
    --must: #D4A017;
    --nice: #6C757D;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--offwhite);
    color: var(--dark);
    -webkit-text-size-adjust: 100%;
    padding-bottom: 80px;
  }

  /* HEADER */
  .header {
    background: var(--teal-dark);
    color: white;
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .header .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }

  /* PROGRESS BAR */
  .progress-wrap {
    background: var(--teal-dark);
    padding: 0 16px 14px;
    position: sticky;
    top: 62px;
    z-index: 99;
  }
  .progress-bar-bg {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: var(--gold);
    height: 100%;
    border-radius: 10px;
    transition: width 0.3s ease;
    width: 0%;
  }
  .progress-text {
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    margin-top: 4px;
    text-align: right;
  }

  /* INSTALL BANNER */
  .install-banner {
    background: linear-gradient(135deg, var(--gold), #D4A017);
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
  }
  .install-banner.hidden { display: none; }
  .install-banner-text { flex: 1; line-height: 1.3; }
  .install-banner-text small { display: block; font-weight: 400; font-size: 11px; opacity: 0.9; margin-top: 2px; }
  .install-btn {
    background: white;
    color: var(--teal-dark);
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .install-dismiss {
    background: none;
    border: none;
    color: rgba(255,255,255,0.8);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  /* FILTER TABS */
  .filter-bar {
    display: flex;
    gap: 6px;
    padding: 10px 16px;
    overflow-x: auto;
    background: white;
    border-bottom: 1px solid var(--light-gray);
    position: sticky;
    top: 84px;
    z-index: 98;
  }
  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--light-gray);
    background: white;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active {
    background: var(--teal);
    color: white;
    border-color: var(--teal);
  }

  /* DAY SECTIONS */
  .day-section { margin: 12px 12px 0; }
  .day-header {
    background: var(--teal);
    color: white;
    padding: 12px 14px;
    border-radius: 10px 10px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .day-header h2 { font-size: 15px; font-weight: 700; }
  .day-header .day-count {
    font-size: 11px;
    background: rgba(255,255,255,0.2);
    padding: 2px 10px;
    border-radius: 12px;
  }
  .day-header .chevron {
    font-size: 18px;
    transition: transform 0.2s;
    margin-left: 8px;
  }
  .day-header.collapsed .chevron { transform: rotate(-90deg); }
  .day-body {
    background: white;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .day-body.hidden { display: none; }

  /* SHOT CARDS */
  .shot-card {
    padding: 12px 14px;
    border-bottom: 1px solid var(--light-gray);
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: background 0.2s;
  }
  .shot-card:last-child { border-bottom: none; }
  .shot-card.checked { background: #F0FFF4; opacity: 0.7; }
  .shot-card.checked .shot-desc { text-decoration: line-through; color: var(--gray); }

  .shot-check {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2.5px solid var(--light-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin-top: 2px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .shot-check.done {
    background: var(--teal);
    border-color: var(--teal);
  }
  .shot-check.done::after {
    content: "\2713";
    color: white;
    font-size: 16px;
    font-weight: 700;
  }

  .shot-content { flex: 1; min-width: 0; }
  .shot-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3px;
  }
  .shot-time {
    font-size: 12px;
    font-weight: 700;
    color: var(--teal);
  }
  .shot-priority {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .shot-priority.must {
    background: var(--gold-light);
    color: var(--must);
  }
  .shot-priority.nice {
    background: var(--light-gray);
    color: var(--nice);
  }
  .shot-agenda {
    font-size: 14px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 4px;
  }
  .shot-desc {
    font-size: 13px;
    color: #444;
    line-height: 1.4;
  }
  .shot-notes {
    font-size: 11px;
    color: var(--gold);
    font-weight: 600;
    margin-top: 5px;
    line-height: 1.3;
  }
  .shot-promo {
    font-size: 10px;
    color: var(--gray);
    margin-top: 3px;
  }

  /* BOTTOM STATS */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--teal-dark);
    color: white;
    padding: 10px 16px;
    display: flex;
    justify-content: space-around;
    font-size: 12px;
    font-weight: 600;
    z-index: 100;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.15);
  }
  .bottom-stat span { font-size: 18px; display: block; text-align: center; }

  /* Hide cards when filtered */
  .shot-card.filter-hidden { display: none; }
  .day-section.filter-hidden { display: none; }
</style>
</head>

  { id:34, day:"any", dayLabel:"Anytime \u2014 Throughout Trip", time:"Any quiet moment", agenda:"Ketra Lighting in Houses", desc:"Rooms at different settings. Color-changing sequences. Light on surfaces. Warm vs. daylight comparison.", priority:"must", notes:"Shoot when houses empty. Product demo footage is critical.", promo:"Both" },
  { id:35, day:"any", dayLabel:"Anytime \u2014 Throughout Trip", time:"Anytime", agenda:"Coastal Source Audio", desc:"Outdoor speakers in landscaping. Sound system in garden/beach.", priority:"nice", notes:"Not in current promos but useful for future content.", promo:"N/A" },
  { id:36, day:"any", dayLabel:"Anytime \u2014 Throughout Trip", time:"Various times of day", agenda:"Property Beauty Shots", desc:"Both houses at sunrise, golden hour, blue hour. Pool reflections. Garden. Ocean vantage points.", priority:"must", notes:"Establishing shots throughout both promos. Shoot at different times.", promo:"Both" },
  { id:37, day:"any", dayLabel:"Anytime \u2014 Throughout Trip", time:"Throughout", agenda:"Relationship Moments", desc:"Candid dealer-builder conversations. Walking beach. Handshakes. Genuine laughter.", priority:"must", notes:"Core Dealer promo message. These sell the trip.", promo:"Dealer" },
  { id:38, day:"any", dayLabel:"Anytime \u2014 Throughout Trip", time:"Throughout", agenda:"Costa Rica B-Roll", desc:"Tropical flora. Wildlife (monkeys, birds). Ocean waves. Palm trees. Colorful local details.", priority:"nice", notes:"Fill transitions and montages.", promo:"Both" }
];

// State — use localStorage to persist checkbox state
let checked = {};
try { checked = JSON.parse(localStorage.getItem('shotChecked') || '{}'); } catch(e) { checked = {}; }

function saveState() {
  try { localStorage.setItem('shotChecked', JSON.stringify(checked)); } catch(e) {}
}

function updateProgress() {
  const done = Object.keys(checked).length;
  const mustLeft = SHOTS.filter(s => s.priority === 'must' && !checked[s.id]).length;
  document.getElementById('progressFill').style.width = ((done / SHOTS.length) * 100) + '%';
  document.getElementById('progressText').textContent = done + ' / ' + SHOTS.length + ' shots captured';
  document.getElementById('statDone').textContent = done;
  document.getElementById('statMust').textContent = mustLeft;
  document.getElementById('statTotal').textContent = SHOTS.length;
}

function render() {
  const container = document.getElementById('shotList');
  container.innerHTML = '';
  const days = [];
  const dayMap = {};
  SHOTS.forEach(s => {
    if (!dayMap[s.dayLabel]) { dayMap[s.dayLabel] = []; days.push(s.dayLabel); }
    dayMap[s.dayLabel].push(s);
  });

  days.forEach(dayLabel => {
    const shots = dayMap[dayLabel];
    const dayKey = shots[0].day;
    const mustCount = shots.filter(s => s.priority === 'must').length;
    const doneCount = shots.filter(s => checked[s.id]).length;

    const section = document.createElement('div');
    section.className = 'day-section';
    section.dataset.day = dayKey;

    const header = document.createElement('div');
    header.className = 'day-header';
    header.innerHTML = '<div><h2>' + dayLabel + '</h2></div><div><span class="day-count">' + doneCount + '/' + shots.length + ' (' + mustCount + ' must)</span><span class="chevron">&#x25BC;</span></div>';

    const body = document.createElement('div');
    body.className = 'day-body';

    header.addEventListener('click', function() {
      header.classList.toggle('collapsed');
      body.classList.toggle('hidden');
    });

    shots.forEach(s => {
      const card = document.createElement('div');
      card.className = 'shot-card' + (checked[s.id] ? ' checked' : '');
      card.dataset.day = s.day;
      card.dataset.priority = s.priority;

      const check = document.createElement('div');
      check.className = 'shot-check' + (checked[s.id] ? ' done' : '');
      check.addEventListener('click', function(e) {
        e.stopPropagation();
        if (checked[s.id]) { delete checked[s.id]; }
        else { checked[s.id] = true; }
        saveState();
        check.classList.toggle('done');
        card.classList.toggle('checked');
        updateProgress();
        const dc = shots.filter(x => checked[x.id]).length;
        header.querySelector('.day-count').textContent = dc + '/' + shots.length + ' (' + mustCount + ' must)';
      });

      const content = document.createElement('div');
      content.className = 'shot-content';
      content.innerHTML =
        '<div class="shot-top"><span class="shot-time">' + s.time + '</span><span class="shot-priority ' + s.priority + '">' + (s.priority === 'must' ? 'Must Have' : 'Nice to Have') + '</span></div>' +
        '<div class="shot-agenda">' + s.agenda + '</div>' +
        '<div class="shot-desc">' + s.desc + '</div>' +
        (s.notes ? '<div class="shot-notes">' + s.notes + '</div>' : '') +
        '<div class="shot-promo">Used in: ' + s.promo + '</div>';

      card.appendChild(check);
      card.appendChild(content);
      body.appendChild(card);
    });

    section.appendChild(header);
    section.appendChild(body);
    container.appendChild(section);
  });

  updateProgress();
}

// FILTERING
document.querySelector('.filter-bar').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filter = btn.dataset.filter;

  document.querySelectorAll('.day-section').forEach(sec => {
    if (filter === 'all' || filter === 'must') { sec.classList.remove('filter-hidden'); }
    else { sec.classList.toggle('filter-hidden', sec.dataset.day !== filter); }
  });

  document.querySelectorAll('.shot-card').forEach(card => {
    if (filter === 'all') { card.classList.remove('filter-hidden'); }
    else if (filter === 'must') { card.classList.toggle('filter-hidden', card.dataset.priority !== 'must'); }
    else { card.classList.remove('filter-hidden'); }
  });
});

// ============================================================
// INSTALL / ADD TO HOME SCREEN
// ============================================================

// For Android/Chrome — capture the beforeinstallprompt event
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  const banner = document.getElementById('installBanner');
  // Don't show if user already dismissed
  try { if (localStorage.getItem('installDismissed')) return; } catch(e) {}
  banner.classList.remove('hidden');
}

document.getElementById('installBtn').addEventListener('click', function() {
  if (deferredPrompt) {
    // Android/Chrome native install
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(result) {
      deferredPrompt = null;
      document.getElementById('installBanner').classList.add('hidden');
    });
  } else {
    // iOS or no native prompt — show instructions
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      alert("To add to your home screen:\n\n1. Tap the Share button (square with arrow) at the bottom of Safari\n2. Scroll down and tap \"Add to Home Screen\"\n3. Tap \"Add\"\n\nThe app will appear on your home screen!");
    } else {
      alert("To add to your home screen:\n\n1. Tap the browser menu (\u22ee or \u2026)\n2. Tap \"Add to Home Screen\" or \"Install App\"\n3. Confirm\n\nThe app will appear on your home screen!");
    }
  }
});

document.getElementById('installDismiss').addEventListener('click', function() {
  document.getElementById('installBanner').classList.add('hidden');
  try { localStorage.setItem('installDismissed', 'true'); } catch(e) {}
});

// On iOS, show the install banner since there's no beforeinstallprompt
// Check if NOT already installed as standalone
if (window.navigator.standalone !== true && !window.matchMedia('(display-mode: standalone)').matches) {
  // Show after a short delay so the page loads first
  setTimeout(function() {
    if (!deferredPrompt) { showInstallBanner(); }
  }, 1500);
}

// ============================================================
// SERVICE WORKER — enables offline use + installability
// ============================================================
if ('serviceWorker' in navigator) {
  // Register an inline service worker using a blob URL
  const swCode = `
    const CACHE_NAME = 'shot-list-v1';
    self.addEventListener('install', function(e) {
      e.waitUntil(
        caches.open(CACHE_NAME).then(function(cache) {
          return cache.addAll(['./', './index.html']);
        }).catch(function() { /* ignore cache errors */ })
      );
      self.skipWaiting();
    });
    self.addEventListener('activate', function(e) {
      self.clients.claim();
    });
    self.addEventListener('fetch', function(e) {
      e.respondWith(
        caches.match(e.request).then(function(r) {
          return r || fetch(e.request);
        }).catch(function() {
          return caches.match('./');
        })
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(function() {
    // Service worker registration may fail on some browsers — that's OK
  });
}

render();
</script>
